# Base Bootcamp — Netlify configuration
# Static site: no build step, just publish the folder as-is.

[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Long cache for static assets (they're versioned by content rarely changing)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Redirect old WordPress event URLs to the new themed-courses page
[[redirects]]
  from = "/evenement"
  to = "/parcours-thematiques"
  status = 301

[[redirects]]
  from = "/evenement/*"
  to = "/parcours-thematiques"
  status = 301

[[redirects]]
  from = "/events/*"
  to = "/parcours-thematiques"
  status = 301
