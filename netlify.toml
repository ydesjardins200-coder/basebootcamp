# Base Bootcamp — Netlify configuration
# Static site: no build step, just publish the folder as-is.

[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Images & fonts rarely change — safe to cache for a long time
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS/JS change often — always revalidate so updates appear immediately
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Redirect old WordPress event URLs to the new themed-courses page
[[redirects]]
  from = "/evenement"
  to = "/parcours-thematiques"
  status = 301

[[redirects]]
  from = "/evenement/*"
  to = "/parcours-thematiques"
  status = 301

[[redirects]]
  from = "/events/*"
  to = "/parcours-thematiques"
  status = 301
